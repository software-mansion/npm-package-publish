name: Test action
on:
  workflow_dispatch:
    inputs:
      package-name:
        description: Name of the package to publish.
        type: string
        required: true
        default: 'react-native-gesture-handler'
      release-type:
        description: Type of release to publish.
        type: choice
        options:
          - stable
          - nightly
          - beta
          - rc
        default: stable
      version:
        description: Specific version to publish (usually inferred from x.y-stable branch name).
        type: string
        required: false
        default: ''

jobs:
  test-action:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/

      - name: Run action
        uses: ./ 
        with:
          package-name: ${{ inputs.package-name }}
          package-json-path: './package.json'
          release-type: ${{ inputs.release-type }}
          version: ${{ inputs.version }}
          dry-run: true
          install-dependencies-command: 'npm ci'
